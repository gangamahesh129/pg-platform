version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pg-management-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pg_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pg_management"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pg-management-network

  pg-management:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pg-management-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pg_management
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: pg-management-secret-key-must-be-at-least-256-bits-for-hs256
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pg-management-network

volumes:
  postgres_data:

networks:
  pg-management-network:
    driver: bridge
