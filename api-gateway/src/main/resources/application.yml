server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
        - id: hostel-service
          uri: lb://hostel-service
          predicates:
            - Path=/api/hostels/**
        - id: guest-service
          uri: lb://guest-service
          predicates:
            - Path=/api/guests/**
        - id: billing-service
          uri: lb://billing-service
          predicates:
            - Path=/api/billing/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  # Must match auth-service HS256 secret (ideally set via env var JWT_SECRET)
  secret: ${JWT_SECRET:pgplatform-secret-key-must-be-at-least-256-bits-for-hs256}
  # Endpoints that should NOT require Authorization header
  public-paths:
    - /api/auth/**
    - /actuator/**
